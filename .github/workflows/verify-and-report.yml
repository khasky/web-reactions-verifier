# Scheduled independent verification → status page.
#
# Runs the real verifier against the public API + log and POSTs its PASS/FAIL verdict
# to the Worker's status ingest endpoint, which drives the "Independent verification"
# component on webreactions.app/status. This is the out-of-band, independent check the
# Worker itself can't perform on its own data.
#
# Required GitHub settings on this repo:
#   - Variable  LOG_PUBKEY        — the published Ed25519 public key (base64). Public.
#   - Secret    STATUS_INGEST_KEY — matches the Worker's STATUS_INGEST_KEY secret.
#
# Note: --ots is intentionally omitted. OpenTimestamps matures over hours–days, so a
# young log has no Bitcoin proof yet and --ots would report FAIL; the Bitcoin component
# on the status page is derived separately (and leniently) by the Worker. This job
# covers the core tamper-evidence checks (signature, Merkle re-fold, counters,
# revocations, structural invariants).

name: verify-and-report

on:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: verify-and-report
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      API: https://api.webreactions.app
      REPO: https://raw.githubusercontent.com/khasky/web-reactions-log/main
      LOG_PUBKEY: ${{ vars.LOG_PUBKEY }}
      STATUS_INGEST_KEY: ${{ secrets.STATUS_INGEST_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: pnpm install

      - name: Run verifier (--json)
        run: |
          set +e
          node src/verify.mjs --json --api "$API" --repo "$REPO" --pubkey "$LOG_PUBKEY" > result.json
          code=$?
          set -e
          # If the verifier crashed before emitting JSON, synthesize an explicit fail so
          # the status page reflects the failure instead of going stale.
          if ! node -e "JSON.parse(require('fs').readFileSync('result.json','utf8'))" 2>/dev/null; then
            printf '{"result":"fail","checks":{"run":"fail"},"ts":%s000}\n' "$(date +%s)" > result.json
          fi
          echo "verifier exit code: $code"
          cat result.json

      - name: Report to /status/ingest
        if: ${{ env.STATUS_INGEST_KEY != '' }}
        run: |
          curl -fsS -X POST "$API/status/ingest" \
            -H "x-status-key: $STATUS_INGEST_KEY" \
            -H "content-type: application/json" \
            --data @result.json
