# Scheduled independent verification → status surface, for BOTH environments.
#
# A matrix job runs the real verifier against each environment's public API + log and
# POSTs its PASS/FAIL verdict to that environment's Worker status-ingest endpoint. This
# is the out-of-band, independent check the Worker cannot perform on its own data.
#
# Required GitHub settings on THIS repo — per environment
# (Settings → Environments → production / staging → add each):
#   - Variable  LOG_PUBKEY        — that env's published Ed25519 public key (base64). Public.
#   - Secret    STATUS_INGEST_KEY — matches that env's Worker STATUS_INGEST_KEY secret.
# The prod and staging keys DIFFER (each env signs its own log), so they MUST live on
# the environments, not as a single repo-level value. Leaving them repo-level (or as a
# repo `Secret` for LOG_PUBKEY, which the workflow reads via `vars.`) resolves to empty.
#
# Note: --ots is intentionally omitted. OpenTimestamps matures over hours–days, so a
# young log has no Bitcoin proof yet and --ots would report FAIL; the Bitcoin component
# is derived separately (and leniently) by the Worker. This job covers the core
# tamper-evidence checks (signature, Merkle re-fold, counters, revocations, invariants)
# plus the Sigstore Rekor cross-check, which now runs by default (an unreachable Rekor
# downgrades to a skip, so a third-party outage can't flip this verdict to FAIL).

name: verify-and-report

on:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false # a staging failure must not cancel the production check
      matrix:
        include:
          - target: production
            api: https://api.webreactions.app
            repo: https://raw.githubusercontent.com/khasky/web-reactions-log/main
          - target: staging
            api: https://api-staging.webreactions.app
            repo: https://raw.githubusercontent.com/khasky/web-reactions-log-staging/main
    environment: ${{ matrix.target }}
    concurrency:
      group: verify-and-report-${{ matrix.target }}
      cancel-in-progress: false
    env:
      API: ${{ matrix.api }}
      REPO: ${{ matrix.repo }}
      LOG_PUBKEY: ${{ vars.LOG_PUBKEY }}
      STATUS_INGEST_KEY: ${{ secrets.STATUS_INGEST_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # Reproducible install: honor the committed lockfile, and skip dependency
      # lifecycle scripts (the only dep is @noble/ed25519 — pure JS, no build), so a
      # compromised transitive postinstall can't run with the job's secrets in scope.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run verifier (--json)
        env:
          # Lifts the unauthenticated api.github.com quota for the checkpoint-archive
          # listing (shared runner IPs are routinely rate-limited; without a token the
          # archive check would downgrade to a skip instead of running).
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          node src/verify.mjs --json --api "$API" --repo "$REPO" --pubkey "$LOG_PUBKEY" > result.json
          code=$?
          set -e
          # If the verifier crashed before emitting JSON, synthesize an explicit fail so
          # the status surface reflects the failure instead of going stale.
          if ! node -e "JSON.parse(require('fs').readFileSync('result.json','utf8'))" 2>/dev/null; then
            printf '{"result":"fail","checks":{"run":"fail"},"ts":%s000}\n' "$(date +%s)" > result.json
          fi
          echo "verifier exit code: $code"
          cat result.json

      - name: Report to /status/ingest
        if: ${{ env.STATUS_INGEST_KEY != '' }}
        run: |
          curl -fsS -X POST "$API/status/ingest" \
            -H "x-status-key: $STATUS_INGEST_KEY" \
            -H "content-type: application/json" \
            --data @result.json
